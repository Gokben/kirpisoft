---
deployment:
  tasks:
    - export DEPLOYPATH=/home/krpsoftc/public_html/
    - /bin/rm -f $DEPLOYPATH/index.html $DEPLOYPATH/iletisim.html $DEPLOYPATH/install.php
    - /bin/cp index.php iletisim.php database.sql config.example.php $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH
    - /bin/rm -rf $DEPLOYPATH/admin $DEPLOYPATH/inc
    - /bin/cp -R admin inc $DEPLOYPATH
    - /bin/rm -rf $DEPLOYPATH/assets
    - /bin/cp -R assets $DEPLOYPATH
